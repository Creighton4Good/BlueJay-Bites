<text x="575" y="363" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#534AB7">Promote/demote</text>

<line x1="575" y1="381" x2="575" y2="425" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="500" y="425" width="150" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="575" y="443" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">Analytics</text>
<text x="575" y="463" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" fill="#534AB7">Metrics dashboard</text>

