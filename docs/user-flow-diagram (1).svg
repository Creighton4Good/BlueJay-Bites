<text x="340" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5F5E5A">event organizer</text>
<text x="575" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5F5E5A">admin</text>

