<svg width="680" viewBox="0 0 680 650" xmlns="http://www.w3.org/2000/svg" style="background:#fff;">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="340" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#222">BlueJay-Bites — User flow diagram</text>

<!-- Login -->
<rect x="265" y="35" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="57" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Login</text>

<!-- Arrows from login - horizontal at y=88, labels at y=115, boxes at y=135 -->
<path d="M340 79 L340 88 L110 88 L110 135" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 79 L340 135" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 79 L340 88 L575 88 L575 135" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

